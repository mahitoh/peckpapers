name: peckpapers

description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.10.5+9
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  pdf: ^3.11.0
  printing: ^5.12.0
  path_provider: ^2.1.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora/Sora-VariableFont_wght.ttf
        - asset: assets/fonts/Sora/static/Sora-Light.ttf
          weight: 300
        - asset: assets/fonts/Sora/static/Sora-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sora/static/Sora-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Sora/static/Sora-ExtraLight.ttf
          weight: 200
    - family: DMSans
      fonts:
        - asset: assets/fonts/DM_Sans/DMSans-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/DM_Sans/static/DMSans_18pt-Regular.ttf
        - asset: assets/fonts/DM_Sans/static/DMSans_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/DM_Sans/static/DMSans_18pt-Bold.ttf
          weight: 700
